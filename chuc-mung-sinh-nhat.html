<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nguyễn Văn Tú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,500&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-a:#eafcf4;
    --bg-b:#fdecf4;
    --bg-c:#f1ecfc;
    --mint:#5fd7ac;
    --mint-dark:#37b78e;
    --pink:#ff8fb3;
    --pink-dark:#ff5f95;
    --purple:#b48af0;
    --purple-dark:#8e5fe0;
    --gold:#ffc773;
    --ink:#3c3157;
    --ink-soft:#6d6190;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Be Vietnam Pro',sans-serif;
    background:linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 52%, var(--bg-c) 100%);
    overflow:hidden;
    color:var(--ink);
  }
  .fx-canvas{
    position:fixed;inset:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:8;
  }
  .stage{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
  }

  /* soft floating bokeh */
  .bokeh-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .bokeh{
    position:absolute;
    border-radius:50%;
    filter:blur(38px);
    opacity:.35;
    mix-blend-mode:multiply;
    animation:floatBokeh ease-in-out infinite;
  }
  @keyframes floatBokeh{
    0%,100%{transform:translateY(0) translateX(0) scale(1);}
    50%{transform:translateY(-26px) translateX(14px) scale(1.06);}
  }

  .glow{
    position:absolute;top:50%;left:50%;
    width:600px;height:600px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.65), rgba(255,255,255,0) 70%);
    pointer-events:none;
    z-index:1;
  }

  /* music toggle */
  .music-btn{
    position:fixed;top:18px;right:18px;z-index:20;
    background:rgba(255,255,255,.6);
    border:1px solid rgba(180,138,240,.35);
    color:var(--purple-dark);
    padding:9px 16px;border-radius:999px;font-size:13px;
    font-family:'Be Vietnam Pro',sans-serif;letter-spacing:.03em;
    cursor:pointer;backdrop-filter:blur(6px);
    box-shadow:0 4px 14px rgba(180,138,240,.18);
    transition:background .2s ease, transform .2s ease;
  }
  .music-btn:hover{background:rgba(255,255,255,.9);transform:translateY(-1px);}
  .music-btn.on{border-color:var(--pink-dark);color:var(--pink-dark);}

  /* scenes */
  .scene{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 24px;
    opacity:0;pointer-events:none;
    transition:opacity .7s ease;
    z-index:5;
  }
  .scene.active{opacity:1;pointer-events:auto;}

  /* ===== SCENE 1 : GIFT ===== */
  .hint{
    position:absolute;top:16%;text-align:center;
    font-size:14px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--purple-dark);opacity:.9;
    animation:floatHint 3.2s ease-in-out infinite;
  }
  .hint span{
    display:block;font-family:'Fraunces',serif;font-style:italic;
    font-size:22px;letter-spacing:0;text-transform:none;color:var(--ink);margin-top:6px;
  }
  @keyframes floatHint{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .hint.hide{opacity:0;transition:opacity .5s ease;}

  .gift{position:relative;width:220px;height:170px;cursor:pointer;transition:transform .3s ease;}
  .gift:hover{transform:translateY(-4px) scale(1.02);}
  .gift:focus-visible{outline:3px solid var(--purple);outline-offset:6px;border-radius:12px;}
  .box{
    position:absolute;bottom:0;left:10px;width:200px;height:120px;
    background:linear-gradient(160deg, var(--mint), var(--mint-dark));
    border-radius:10px;
    box-shadow:0 18px 36px rgba(90,60,150,.22), inset 0 -8px 14px rgba(0,0,0,.08);
    transition:transform .7s cubic-bezier(.4,0,.2,1), opacity .7s ease;
  }
  .box::before{
    content:'';position:absolute;left:50%;top:0;bottom:0;width:26px;transform:translateX(-50%);
    background:linear-gradient(180deg, var(--pink), var(--pink-dark));
  }
  .lid{
    position:absolute;top:14px;left:0;width:220px;height:44px;
    background:linear-gradient(160deg, var(--purple), var(--purple-dark));
    border-radius:10px 10px 4px 4px;
    box-shadow:0 10px 20px rgba(90,60,150,.22);
    transition:transform .8s cubic-bezier(.34,1.4,.64,1), opacity .8s ease;
    z-index:2;
  }
  .lid::before{
    content:'';position:absolute;left:50%;top:0;bottom:0;width:30px;transform:translateX(-50%);
    background:linear-gradient(180deg, var(--pink-dark), var(--pink));
  }
  .bow{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:64px;height:34px;}
  .bow::before,.bow::after{
    content:'';position:absolute;top:0;width:30px;height:30px;
    background:radial-gradient(circle at 30% 30%, #ffd7e4, var(--pink) 70%);
    border-radius:60% 40% 60% 40%;
  }
  .bow::before{left:0;transform:rotate(-25deg);}
  .bow::after{right:0;transform:rotate(25deg) scaleX(-1);}
  .bow-knot{
    position:absolute;left:50%;top:6px;transform:translateX(-50%);
    width:16px;height:16px;background:var(--pink-dark);border-radius:4px;
    box-shadow:0 0 0 2px rgba(255,255,255,.5);z-index:1;
  }
  .gift.opened .lid{transform:translate(60px,-190px) rotate(-35deg);opacity:0;}
  .gift.opened .box{transform:scale(.85);opacity:0;transition-delay:.05s;}
  .gift.opened{pointer-events:none;}
  .burst{
    position:absolute;left:50%;top:40%;width:10px;height:10px;transform:translate(-50%,-50%);
    border-radius:50%;background:var(--white);
    box-shadow:0 0 0 0 rgba(255,255,255,.8);
    opacity:0;z-index:3;
  }
  .gift.opened .burst{animation:burstOut .8s ease-out forwards;}
  @keyframes burstOut{
    0%{opacity:1;box-shadow:0 0 0 0 rgba(255,255,255,.8);}
    100%{opacity:0;box-shadow:0 0 0 340px rgba(255,255,255,0);}
  }

  /* ===== SCENE 2 : CAKE ===== */
  .cake-hint{
    font-family:'Fraunces',serif;font-style:italic;
    font-size:clamp(20px,3.4vw,28px);color:var(--ink);margin-bottom:88px;
  }
  .cake-hint .sub{
    display:block;font-family:'Be Vietnam Pro',sans-serif;font-style:normal;
    font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--purple-dark);margin-top:8px;
  }
  .cake{position:relative;width:240px;}
  .candles{position:absolute;top:-52px;left:0;right:0;display:flex;justify-content:center;gap:26px;}
  .candle{cursor:pointer;display:flex;flex-direction:column;align-items:center;}
  .stick{width:8px;height:32px;background:linear-gradient(180deg,#ffffff,#ffd9e6);border-radius:2px;}
  .flame{
    width:11px;height:16px;margin-bottom:-2px;
    border-radius:60% 60% 60% 60%/80% 80% 40% 40%;
    background:radial-gradient(circle at 50% 70%, #fff6c8, var(--gold) 55%, #ff9a4d 90%);
    box-shadow:0 0 12px 3px rgba(255,183,80,.55);
    animation:flicker 1.1s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes flicker{
    0%,100%{transform:scaleY(1) rotate(-2deg);}
    50%{transform:scaleY(1.12) rotate(3deg);}
  }
  .candle.out .flame{animation:none;opacity:0;box-shadow:none;}
  .candle.out .smoke{
    position:absolute;width:6px;height:6px;background:rgba(150,130,190,.4);
    border-radius:50%;animation:smokeRise 1.4s ease-out forwards;
  }
  @keyframes smokeRise{
    0%{opacity:.6;transform:translateY(0) scale(1);}
    100%{opacity:0;transform:translateY(-40px) scale(2.4);}
  }
  .cake-top{
    width:156px;height:54px;margin:0 auto;
    background:linear-gradient(160deg, #ffffff, #f6ecff);
    border-radius:28px 28px 12px 12px;position:relative;
    box-shadow:0 8px 16px rgba(90,60,150,.16), inset 0 3px 6px rgba(255,255,255,.9);
    z-index:2;
  }
  .cake-top::after{
    content:'';position:absolute;left:4px;right:4px;bottom:-11px;height:20px;
    background-image:radial-gradient(circle at 11px 6px, #ffffff 8px, transparent 9px);
    background-size:24px 20px;background-repeat:repeat-x;
    filter:drop-shadow(0 2px 2px rgba(90,60,150,.1));
  }
  .cake-mid{
    width:202px;height:56px;margin:6px auto 0;
    background:linear-gradient(160deg, var(--pink), var(--pink-dark));
    border-radius:16px;
    box-shadow:0 8px 16px rgba(90,60,150,.18), inset 0 3px 6px rgba(255,255,255,.35);
    position:relative;
  }
  .cake-base{
    width:238px;height:58px;margin:6px auto 0;
    background:linear-gradient(160deg, var(--mint), var(--mint-dark));
    border-radius:16px;
    box-shadow:0 12px 22px rgba(90,60,150,.22), inset 0 3px 6px rgba(255,255,255,.35);
  }
  .plate{
    width:270px;height:16px;margin:6px auto 0;
    background:linear-gradient(180deg, rgba(180,138,240,.4), rgba(180,138,240,.06));
    border-radius:50%;
    box-shadow:0 10px 18px rgba(140,110,190,.18);
  }
  .candles-left{font-size:13px;letter-spacing:.08em;color:var(--purple-dark);margin-top:22px;opacity:.9;}

  /* ===== SCENE 3 : FINAL ===== */
  .eyebrow{font-size:13px;letter-spacing:.35em;text-transform:uppercase;color:var(--purple-dark);margin:0 0 10px;}
  .hbd{
    font-family:'Fraunces',serif;font-weight:600;font-style:italic;
    font-size:clamp(40px,8vw,78px);margin:0;line-height:1.4;padding-bottom:.22em;
    background:linear-gradient(120deg, var(--purple-dark), var(--pink-dark) 55%, var(--mint-dark));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .name{
    font-family:'Be Vietnam Pro',sans-serif;font-weight:700;
    font-size:clamp(22px,4.2vw,34px);letter-spacing:.02em;
    margin:14px 0 18px;color:var(--pink-dark);
    text-shadow:0 0 20px rgba(255,143,179,.25);
  }
  .wish{
    max-width:500px;margin:0 auto;min-height:5.3em;
    font-size:clamp(15px,2vw,18px);line-height:1.75;color:var(--ink);opacity:.95;
  }
  .wish .cursor{display:inline-block;width:2px;background:var(--purple-dark);margin-left:2px;animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  .replay{
    margin-top:26px;margin-right:8px;
    background:transparent;border:1px solid rgba(140,110,190,.35);color:var(--ink-soft);
    padding:9px 20px;border-radius:999px;font-size:13px;letter-spacing:.05em;
    cursor:pointer;transition:background .2s ease, transform .2s ease;
    font-family:'Be Vietnam Pro',sans-serif;
  }
  .replay:hover{background:rgba(180,138,240,.12);transform:translateY(-1px);}

  /* lucky draw feature */
  .draw-btn{
    margin-top:26px;
    background:linear-gradient(120deg, var(--mint), var(--purple));
    border:none;color:#fff;font-weight:600;
    padding:11px 24px;border-radius:999px;font-size:14px;letter-spacing:.02em;
    cursor:pointer;box-shadow:0 8px 20px rgba(140,110,190,.32);
    transition:transform .2s ease, box-shadow .2s ease;
    font-family:'Be Vietnam Pro',sans-serif;
  }
  .draw-btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(140,110,190,.4);}
  .draw-btn:active{transform:translateY(0);}

  .lucky-card{
    max-width:420px;margin:18px auto 0;
    background:rgba(255,255,255,.85);
    border:1px solid rgba(180,138,240,.3);
    border-radius:16px;
    padding:0 22px;
    max-height:0;
    overflow:hidden;
    opacity:0;
    box-shadow:0 10px 26px rgba(140,110,190,.18);
    transition:max-height .5s cubic-bezier(.2,.8,.2,1), opacity .4s ease, padding .5s ease;
    transform-origin:top center;
  }
  .lucky-card.show{
    max-height:200px;
    opacity:1;
    padding:18px 22px;
  }
  .lucky-label{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mint-dark);margin:0 0 6px;
  }
  .lucky-text{
    margin:0;font-family:'Fraunces',serif;font-style:italic;
    font-size:16px;line-height:1.6;color:var(--ink);
  }
  .actions-row{display:flex;flex-wrap:wrap;justify-content:center;}

  /* confetti + balloons */
  .confetti-piece{
    position:absolute;top:-10px;width:8px;height:14px;opacity:.95;border-radius:2px;
    animation-name:fall;animation-timing-function:linear;animation-fill-mode:forwards;z-index:9;
  }
  @keyframes fall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    90%{opacity:1;}
    100%{transform:translateY(105vh) rotate(540deg);opacity:0;}
  }
  .balloon{
    position:absolute;bottom:-140px;width:46px;height:58px;
    border-radius:50% 50% 50% 50%/58% 58% 42% 42%;
    animation-name:riseBalloon;animation-timing-function:ease-in;animation-fill-mode:forwards;
    z-index:4;opacity:0;
  }
  .balloon::after{
    content:'';position:absolute;left:50%;bottom:-34px;width:1px;height:34px;
    background:rgba(140,110,190,.35);
  }
  @keyframes riseBalloon{
    0%{opacity:0;transform:translateY(0) translateX(0);}
    8%{opacity:.9;}
    100%{opacity:.9;transform:translateY(-115vh) translateX(var(--drift,20px));}
  }

  @media (max-width:480px){
    .gift{width:180px;height:150px;}
    .box{width:160px;height:100px;left:10px;}
    .lid{width:180px;height:38px;}
    .cake-mid{width:170px;}
    .cake-base{width:200px;}
    .plate{width:224px;}
    .candles{gap:20px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }
</style>
</head>
<body>

<canvas class="fx-canvas" id="fx"></canvas>
<button class="music-btn" id="musicBtn">🔈 Nhạc</button>

<div class="stage" id="stage">
  <div class="bokeh-layer" id="bokehLayer"></div>
  <div class="glow"></div>

  <!-- SCENE 1 -->
  <div class="scene active" id="scene-gift">
    <p class="hint" id="hint">Có một món quà đang chờ<span>Chạm vào hộp để mở nhé 🎁</span></p>
    <div class="gift" id="gift" role="button" tabindex="0" aria-label="Mở hộp quà sinh nhật">
      <div class="burst"></div>
      <div class="lid"><div class="bow"></div><div class="bow-knot"></div></div>
      <div class="box"></div>
    </div>
  </div>

  <!-- SCENE 2 -->
  <div class="scene" id="scene-cake">
    <p class="cake-hint">Thổi nến nào, Tú! <span class="sub">Chạm vào từng ngọn nến để thổi tắt</span></p>
    <div class="cake">
      <div class="candles" id="candles">
        <div class="candle" data-i="0"><div class="flame"></div><div class="stick"></div></div>
        <div class="candle" data-i="1"><div class="flame"></div><div class="stick"></div></div>
        <div class="candle" data-i="2"><div class="flame"></div><div class="stick"></div></div>
      </div>
      <div class="cake-top"></div>
      <div class="cake-mid"></div>
      <div class="cake-base"></div>
      <div class="plate"></div>
    </div>
    <p class="candles-left" id="candlesLeft">Còn 3 ngọn nến</p>
  </div>

  <!-- SCENE 3 -->
  <div class="scene" id="scene-final">
    <p class="eyebrow">Gửi đến</p>
    <h1 class="hbd">Happy Birthday</h1>
    <h2 class="name">Nguyễn Văn Tú 🎂</h2>
    <p class="wish" id="wishText"></p>

    <div class="actions-row">
      <button class="draw-btn" id="drawBtn">🍀 Rút thăm lời chúc may mắn</button>
      <button class="replay" id="replay">🔁 Xem lại từ đầu</button>
    </div>

    <div class="lucky-card" id="luckyCard">
      <p class="lucky-label">Lời chúc dành cho Tú hôm nay</p>
      <p class="lucky-text" id="luckyText"></p>
    </div>
  </div>
</div>

<script>
/* ---------- soft floating bokeh background ---------- */
const bokehColors = ['#5fd7ac','#ff8fb3','#b48af0','#ffe1ee','#d9f3ea'];
const bokehLayer = document.getElementById('bokehLayer');
for(let i=0;i<11;i++){
  const b = document.createElement('div');
  b.className='bokeh';
  const size = 150 + Math.random()*160;
  b.style.width = size+'px';
  b.style.height = size+'px';
  b.style.left = Math.random()*100+'%';
  b.style.top = Math.random()*100+'%';
  b.style.background = bokehColors[Math.floor(Math.random()*bokehColors.length)];
  b.style.animationDuration = (12+Math.random()*10)+'s';
  b.style.animationDelay = (Math.random()*4)+'s';
  bokehLayer.appendChild(b);
}

/* ---------- scene management ---------- */
const stage = document.getElementById('stage');
function showScene(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- confetti & balloons ---------- */
const confettiColors = ['#5fd7ac','#ff8fb3','#b48af0','#ffc773','#ffffff','#37b78e'];
const balloonColors = ['#ff8fb3','#b48af0','#5fd7ac','#ffc773'];

function spawnConfetti(count=70, container=stage){
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className='confetti-piece';
    c.style.left = Math.random()*100+'%';
    c.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
    const dur = 2.6 + Math.random()*2.2;
    c.style.animationDuration = dur+'s';
    c.style.animationDelay = (Math.random()*0.5)+'s';
    c.style.width = (5+Math.random()*5)+'px';
    c.style.height = (10+Math.random()*8)+'px';
    container.appendChild(c);
    setTimeout(()=>c.remove(), (dur+1)*1000);
  }
}

function spawnBalloons(count=6, opts={}, container=stage){
  const sideOnly = opts.sideOnly || false;
  const fast = opts.fast || false;
  for(let i=0;i<count;i++){
    const b = document.createElement('div');
    b.className='balloon';
    let left;
    if(sideOnly){
      left = Math.random()<0.5 ? (3 + Math.random()*20) : (77 + Math.random()*20);
    } else {
      left = 8 + Math.random()*84;
    }
    b.style.left = left+'%';
    b.style.background = `radial-gradient(circle at 30% 25%, rgba(255,255,255,.75), ${balloonColors[i % balloonColors.length]} 70%)`;
    b.style.setProperty('--drift', (Math.random()*40-20)+'px');
    const dur = fast ? (4+Math.random()*2) : (8+Math.random()*4);
    b.style.animationDuration = dur+'s';
    b.style.animationDelay = (Math.random()*1.2)+'s';
    container.appendChild(b);
    setTimeout(()=>b.remove(), (dur+2)*1000);
  }
}

/* ---------- fireworks canvas ---------- */
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];
const fireworkColors = ['#5fd7ac','#ff8fb3','#b48af0','#ffc773','#8e5fe0'];

function spawnFirework(x, y){
  const color = fireworkColors[Math.floor(Math.random()*fireworkColors.length)];
  const n = 30;
  for(let i=0;i<n;i++){
    const angle = (Math.PI*2*i)/n + Math.random()*0.2;
    const speed = 1.8 + Math.random()*3.2;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color });
  }
}

function animateFx(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.vy += 0.035; p.life -= 0.014;
    ctx.globalAlpha = Math.max(p.life,0);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.4, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  particles = particles.filter(p=>p.life>0);
  requestAnimationFrame(animateFx);
}
animateFx();

let ambientFireworkTimer = null;
function startAmbientFireworks(){
  stopAmbientFireworks();
  ambientFireworkTimer = setInterval(()=>{
    spawnFirework(
      window.innerWidth * (0.15+Math.random()*0.7),
      window.innerHeight * (0.15+Math.random()*0.35)
    );
  }, 1100);
}
function stopAmbientFireworks(){
  if(ambientFireworkTimer){ clearInterval(ambientFireworkTimer); ambientFireworkTimer=null; }
}

/* ---------- audio (generated melody, no external files) ---------- */
let audioCtx = null;
let musicOn = false;
let musicTimer = null;

const tune = [
  ['G4',0.28],['G4',0.28],['A4',0.55],['G4',0.55],['C5',0.55],['B4',1.05],
  ['G4',0.28],['G4',0.28],['A4',0.55],['G4',0.55],['D5',0.55],['C5',1.05],
  ['G4',0.28],['G4',0.28],['G5',0.55],['E5',0.55],['C5',0.55],['B4',0.55],['A4',1.05],
  ['F5',0.28],['F5',0.28],['E5',0.55],['C5',0.55],['D5',0.55],['C5',1.1]
];
const noteFreq = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99};

function playTuneOnce(){
  if(!audioCtx) return;
  let t = audioCtx.currentTime + 0.05;
  let total = 0;
  tune.forEach(([note,dur])=>{
    const freq = noteFreq[note];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.12, t+0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t+dur*0.95);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t+dur);
    t += dur; total += dur;
  });
  musicTimer = setTimeout(()=>{ if(musicOn) playTuneOnce(); }, total*1000 + 400);
}

function playPop(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(520, t);
  osc.frequency.exponentialRampToValueAtTime(140, t+0.18);
  gain.gain.setValueAtTime(0.14, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.2);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.22);
}

function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}

const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', ()=>{
  ensureAudio();
  musicOn = !musicOn;
  musicBtn.classList.toggle('on', musicOn);
  musicBtn.textContent = musicOn ? '🔊 Nhạc' : '🔈 Nhạc';
  if(musicOn){ playTuneOnce(); } else { clearTimeout(musicTimer); }
});

/* ---------- SCENE 1: gift ---------- */
const gift = document.getElementById('gift');
const hint = document.getElementById('hint');

function openGift(){
  if(gift.classList.contains('opened')) return;
  gift.classList.add('opened');
  hint.classList.add('hide');
  const sceneGiftEl = document.getElementById('scene-gift');
  spawnConfetti(60, sceneGiftEl);
  setTimeout(()=>spawnBalloons(4, {sideOnly:true, fast:true}, sceneGiftEl), 250);
  setTimeout(()=>{ showScene('scene-cake'); }, 900);
}
gift.addEventListener('click', openGift);
gift.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' || e.key===' '){ e.preventDefault(); openGift(); }
});

/* ---------- SCENE 2: cake / candles ---------- */
const candleEls = document.querySelectorAll('.candle');
const candlesLeftEl = document.getElementById('candlesLeft');
let candlesLit = candleEls.length;

candleEls.forEach(c=>{
  c.addEventListener('click', ()=>{
    if(c.classList.contains('out')) return;
    c.classList.add('out');
    candlesLit--;

    const smoke = document.createElement('div');
    smoke.className='smoke';
    c.appendChild(smoke);
    setTimeout(()=>smoke.remove(), 1500);

    const rect = c.getBoundingClientRect();
    spawnFirework(rect.left + rect.width/2, rect.top);

    ensureAudio();
    playPop();

    candlesLeftEl.textContent = candlesLit>0 ? `Còn ${candlesLit} ngọn nến` : 'Đã thổi hết nến! 🎉';

    if(candlesLit === 0){
      setTimeout(()=>{
        showScene('scene-final');
        const sceneFinalEl = document.getElementById('scene-final');
        spawnConfetti(130, sceneFinalEl);
        spawnBalloons(9, {sideOnly:true}, sceneFinalEl);
        startAmbientFireworks();
        typeWish();
      }, 800);
    }
  });
});

/* ---------- SCENE 3: typing wish + lucky draw ---------- */
const wishFull = "Chúc Tú tuổi mới thật nhiều may mắn, gặt hái được thật nhiều thành công, và luôn đạt kết quả học tập thật tốt nha! Mong mọi điều đẹp đẽ nhất sẽ luôn đồng hành cùng Tú! 🎉✨";
const wishEl = document.getElementById('wishText');
let typed = false;

function typeWish(){
  if(typed) return;
  typed = true;
  wishEl.textContent = '';
  const cursor = document.createElement('span');
  cursor.className='cursor';
  cursor.textContent='\u00A0';
  let i = 0;
  const speed = 26;
  function step(){
    if(i <= wishFull.length){
      wishEl.textContent = wishFull.slice(0,i);
      wishEl.appendChild(cursor);
      i++;
      setTimeout(step, speed);
    } else {
      cursor.remove();
    }
  }
  step();
}

const luckyMessages = [
  "Mọi công việc Tú làm đều thuận buồm xuôi gió! 🍀",
  "Điểm số năm nay chắc chắn sẽ đẹp như mơ! 📚✨",
  "Vận may sẽ luôn mỉm cười với Tú! 🌟",
  "Một năm mới bùng nổ năng lượng và cảm hứng! ⚡",
  "Con đường phía trước rộng mở, thành công đang chờ! 🚀",
  "Sức khỏe dồi dào, tinh thần lạc quan mỗi ngày! 💪",
  "Mọi dự định đều thành hiện thực trong năm nay! 🎯",
  "Bạn bè, gia đình luôn ở bên cạnh ủng hộ Tú! 🤝",
  "Một năm tài lộc dồi dào, ví tiền lúc nào cũng đầy! 💰",
  "Nụ cười luôn nở trên môi Tú mỗi ngày! 😄"
];
let lastLucky = -1;
const drawBtn = document.getElementById('drawBtn');
const luckyCard = document.getElementById('luckyCard');
const luckyText = document.getElementById('luckyText');

drawBtn.addEventListener('click', ()=>{
  let idx;
  do{ idx = Math.floor(Math.random()*luckyMessages.length); } while(idx===lastLucky && luckyMessages.length>1);
  lastLucky = idx;
  luckyText.textContent = luckyMessages[idx];
  luckyCard.classList.add('show');
  drawBtn.textContent = '🍀 Rút thăm lần nữa';

  const rect = drawBtn.getBoundingClientRect();
  spawnFirework(rect.left + rect.width/2, rect.top);
  ensureAudio();
  playPop();
});

/* ---------- replay ---------- */
document.getElementById('replay').addEventListener('click', ()=>{
  stopAmbientFireworks();
  gift.classList.remove('opened');
  hint.classList.remove('hide');
  candleEls.forEach(c=>{
    c.classList.remove('out');
    const smoke = c.querySelector('.smoke');
    if(smoke) smoke.remove();
  });
  candlesLit = candleEls.length;
  candlesLeftEl.textContent = `Còn ${candlesLit} ngọn nến`;
  typed = false;
  wishEl.textContent = '';
  luckyCard.classList.remove('show');
  drawBtn.textContent = '🍀 Rút thăm lời chúc may mắn';
  showScene('scene-gift');
});
</script>
